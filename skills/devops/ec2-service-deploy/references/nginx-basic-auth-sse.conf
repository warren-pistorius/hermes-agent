# nginx vhost template for Node.js API with:
#   - HTTPS/SSL (certbot fills cert paths)
#   - Basic auth (htpasswd must be at /etc/nginx/.<service>.htpasswd)
#   - SSE proxy (proxy_buffering off, no cache, long timeouts)
#   - Static files from /var/www/<service>/ (NOT from home dir)
#
# Variables to replace:
#   <DOMAIN>   — e.g. kanban.pistorius.live
#   <INTERNAL_PORT> — e.g. 4444
#   <SERVICE>  — e.g. kanban
#   <REALM>    — e.g. "Hermes Kanban — enter credentials"

server {
    listen 80;
    server_name <DOMAIN>;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name <DOMAIN>;

    ssl_certificate /etc/letsencrypt/live/<DOMAIN>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<DOMAIN>/privkey.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Basic auth — htpasswd must be readable by nginx (www-data)
    # Generate: htpasswd -bc /etc/nginx/.<SERVICE>.htpasswd <user> <password>
    auth_basic "<REALM>";
    auth_basic_user_file /etc/nginx/.<SERVICE>.htpasswd;

    location /api/ {
        proxy_pass http://127.0.0.1:<INTERNAL_PORT>;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE — these 4 directives are REQUIRED
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location /health {
        proxy_pass http://127.0.0.1:<INTERNAL_PORT>;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Static files — /var/www/ NOT home dir (nginx can't read ~/)
    location / {
        root /var/www/<SERVICE>;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
